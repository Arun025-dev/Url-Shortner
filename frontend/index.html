<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkSwift - Premium URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #0ea5e9;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .ambient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.6;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .blob-1 {
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: rgba(99, 102, 241, 0.3);
        }

        .blob-2 {
            bottom: -10%;
            right: -10%;
            width: 60vw;
            height: 60vw;
            background: rgba(14, 165, 233, 0.2);
            animation-delay: -10s;
        }

        @keyframes float {
            0% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(5%, 10%) scale(1.1);
            }

            100% {
                transform: translate(-5%, -5%) scale(0.95);
            }
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f8fafc 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1rem;
            font-weight: 300;
        }

        .tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 32px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px 0;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .tab-btn.active {
            color: var(--text-main);
        }

        .tab-indicator {
            position: absolute;
            top: 6px;
            bottom: 6px;
            left: 6px;
            width: calc(50% - 6px);
            background: var(--card-border);
            border-radius: 8px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .tabs.stats-active .tab-indicator {
            transform: translateX(100%);
        }

        .panel {
            display: none;
            animation: fadeIn 0.4s ease forwards;
        }

        .panel.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        button.action-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--primary-glow);
            letter-spacing: 0.02em;
        }

        button.action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.6);
        }

        button.action-btn:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed var(--card-border);
            border-radius: 12px;
            text-align: center;
            display: none;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 0.4s ease;
        }

        .result-box.error {
            border-color: rgba(239, 68, 68, 0.5);
            color: var(--error);
            background: rgba(239, 68, 68, 0.05);
        }

        .result-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 1.25rem;
            font-weight: 600;
            word-break: break-all;
            padding: 8px;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 8px;
            transition: background 0.2s;
        }

        .result-link:hover {
            background: rgba(14, 165, 233, 0.2);
            text-decoration: underline;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--card-border);
            text-align: left;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            word-break: break-all;
        }

        .stat-highlight {
            font-size: 3rem;
            font-weight: 700;
            color: var(--success);
            line-height: 1;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--primary);
        }
    </style>
</head>

<body>
    <div class="ambient-bg">
        <div class="ambient-blob blob-1"></div>
        <div class="ambient-blob blob-2"></div>
    </div>
    <div class="glass-card">
        <div class="header">
            <h1>LinkSwift</h1>
            <p>Shorten. Share. Track.</p>
        </div>
        <div class="tabs" id="tabContainer">
            <div class="tab-indicator"></div>
            <button class="tab-btn active" onclick="switchTab('shorten')">Shorten</button>
            <button class="tab-btn" onclick="switchTab('stats')">Analytics</button>
        </div>
        <div class="panel active" id="shortenPanel">
            <div class="input-group">
                <input type="url" id="urlInput" placeholder="Paste your long URL here... (https://...)" required
                    autocomplete="off" />
            </div>
            <button class="action-btn" id="shortenBtn">Generate Short Link</button>
            <div class="result-box" id="shortenResult"></div>
        </div>
        <div class="panel" id="statsPanel">
            <div class="input-group">
                <input type="text" id="codeInput" placeholder="Enter short code (e.g. jK9xL2)" required
                    autocomplete="off" />
            </div>
            <button class="action-btn" id="statsBtn">View Performance</button>
            <div class="result-box" id="statsResult" style="padding: 0; background: transparent; border: none;"></div>
        </div>
    </div>
    <script>
        function switchTab(tab) {
            const tabs = document.getElementById('tabContainer');
            const btns = document.querySelectorAll('.tab-btn');

            if (tab === 'stats') {
                tabs.classList.add('stats-active');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                document.getElementById('shortenPanel').classList.remove('active');
                document.getElementById('statsPanel').classList.add('active');
            } else {
                tabs.classList.remove('stats-active');
                btns[1].classList.remove('active');
                btns[0].classList.add('active');
                document.getElementById('statsPanel').classList.remove('active');
                document.getElementById('shortenPanel').classList.add('active');
            }
        }

        document.getElementById('shortenBtn').addEventListener('click', async () => {
            const input = document.getElementById('urlInput').value.trim();
            const resultBox = document.getElementById('shortenResult');
            const btn = document.getElementById('shortenBtn');

            if (!input) {
                showError(resultBox, "Please provide a valid long URL.");
                return;
            }

            btn.textContent = "Processing...";
            btn.style.opacity = '0.8';

            try {
                const response = await fetch('/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: input })
                });

                const data = await response.json();

                if (response.ok) {
                    resultBox.style.display = 'flex';
                    resultBox.className = 'result-box';
                    resultBox.innerHTML = `
                        <span style="color: var(--text-muted); font-size: 0.9rem;">Your short link is ready:</span>
                        <a href="${data.shortUrl}" target="_blank" class="result-link" id="generatedLink">${data.shortUrl}</a>
                        <button class="copy-btn" onclick="copyToClipboard('${data.shortUrl}')">Copy to Clipboard</button>
                    `;
                } else {
                    showError(resultBox, data.error || "An error occurred.");
                }
            } catch (err) {
                showError(resultBox, "Server offline. Please try again later.");
            } finally {
                btn.textContent = "Generate Short Link";
                btn.style.opacity = '1';
            }
        });

        document.getElementById('statsBtn').addEventListener('click', async () => {
            let code = document.getElementById('codeInput').value.trim();
            const resultBox = document.getElementById('statsResult');
            const btn = document.getElementById('statsBtn');

            if (!code) {
                showError(resultBox, "Please enter a short code.");
                return;
            }

            if (code.includes('/')) {
                const parts = code.split('/');
                code = parts[parts.length - 1];
            }

            btn.textContent = "Searching...";
            btn.style.opacity = '0.8';

            try {
                const response = await fetch(`/api/stats/${code}`);
                const data = await response.json();

                if (response.ok) {
                    const date = new Date(data.createdAt).toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });
                    resultBox.style.display = 'flex';
                    resultBox.className = 'result-box';
                    resultBox.innerHTML = `
                        <div class="stats-grid">
                            <div class="stat-card" style="text-align: center; border-color: var(--success); background: rgba(16, 185, 129, 0.05);">
                                <div class="stat-label" style="color: var(--success);">Total Clicks</div>
                                <div class="stat-highlight">${data.clickCount}</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Original Target URL</div>
                                <div class="stat-value" style="font-size: 0.95rem;">
                                    <a href="${data.originalUrl}" target="_blank" style="color: var(--accent); text-decoration: none;">${data.originalUrl}</a>
                                </div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-label">Created On</div>
                                <div class="stat-value" style="font-size: 1rem;">${date}</div>
                            </div>
                        </div>
                    `;
                } else {
                    showError(resultBox, data.error || "URL code not found.");
                }
            } catch (err) {
                showError(resultBox, "Server offline. Please try again later.");
            } finally {
                btn.textContent = "View Performance";
                btn.style.opacity = '1';
            }
        });

        function showError(element, message) {
            element.style.display = 'flex';
            element.className = 'result-box error';
            element.innerHTML = `<div>${message}</div>`;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                const origText = btn.textContent;
                btn.textContent = 'Copied!';
                btn.style.background = 'var(--success)';
                btn.style.borderColor = 'var(--success)';
                setTimeout(() => {
                    btn.textContent = origText;
                    btn.style.background = 'transparent';
                    btn.style.borderColor = 'var(--primary)';
                }, 2000);
            });
        }
    </script>
</body>

</html>
